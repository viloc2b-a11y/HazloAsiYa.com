# Pages Functions: `node:crypto` (MD5 del subscriber hash) en subscribe-email
name = "hazloasiya"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "out"

# Cloudflare Pages no admite [triggers] en wrangler.toml (solo Workers).
# Cron para `functions/_scheduled.ts`: Dashboard → Workers & Pages → tu proyecto Pages
# → Settings → Functions → Cron Triggers, o un Worker aparte con su propio wrangler.
