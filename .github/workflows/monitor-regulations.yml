# Vigencia de src/data/program-limits.json + comprobación opcional con OpenAI (ChatGPT API).
# Secrets opcionales: OPENAI_API_KEY
# Si el monitor falla, se abre un Issue (o se comenta uno abierto con label regulatory-monitor).

name: Monitor regulations

on:
  schedule:
    - cron: '0 10 * * 1' # semanal: lunes 10:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: appdir
        run: |
          if [ -f HazloAsiYa.com/package.json ]; then echo "dir=HazloAsiYa.com" >> $GITHUB_OUTPUT
          elif [ -f package.json ]; then echo "dir=." >> $GITHUB_OUTPUT
          else echo "No se encontró package.json"; exit 1; fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ steps.appdir.outputs.dir }}/package-lock.json

      - name: npm ci
        working-directory: ${{ steps.appdir.outputs.dir }}
        run: npm ci

      - name: Monitor regulatorio (Zod + opcional OpenAI estricto)
        id: monitor
        continue-on-error: true
        working-directory: ${{ steps.appdir.outputs.dir }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          REPORT="monitor-regulatory-report.json"
          if [ -n "$OPENAI_API_KEY" ]; then
            npm run monitor:regulations -- --with-ai --strict --report-json "$REPORT"
          else
            npm run monitor:regulations -- --report-json "$REPORT"
          fi

      - name: Issue en GitHub si el monitor falló
        if: steps.monitor.outcome == 'failure'
        working-directory: ${{ steps.appdir.outputs.dir }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          LABEL="regulatory-monitor"
          gh label create "$LABEL" --color FBCA04 --description "Alertas del workflow Monitor regulations" 2>/dev/null || true
          MD_FILE="monitor-regulatory-report.issue.md"
          if [ ! -f "$MD_FILE" ]; then
            echo "::error::No se encontró $MD_FILE (¿--report-json en el paso anterior?)."
            exit 1
          fi
          TITLE="[Monitor] Revisar program-limits.json"
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "$LABEL" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body-file "$MD_FILE"
            echo "Comentario añadido en issue #$EXISTING"
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body-file "$MD_FILE" --label "$LABEL"
          fi

      - name: Fallar el job si el monitor falló
        if: steps.monitor.outcome == 'failure'
        run: |
          echo "::error::El monitor regulatorio falló. Revisa el log del paso anterior y el Issue creado."
          exit 1
