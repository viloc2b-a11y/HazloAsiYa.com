# Vigencia de src/data/program-limits.json + comprobación opcional con OpenAI o Claude.
# Secretos opcionales: OPENAI_API_KEY, ANTHROPIC_API_KEY

name: Monitor regulations

on:
  schedule:
    - cron: '0 10 * * 1' # semanal: lunes 10:00 UTC
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - id: appdir
        run: |
          if [ -f HazloAsiYa.com/package.json ]; then echo "dir=HazloAsiYa.com" >> $GITHUB_OUTPUT
          elif [ -f package.json ]; then echo "dir=." >> $GITHUB_OUTPUT
          else echo "No se encontró package.json"; exit 1; fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ steps.appdir.outputs.dir }}/package-lock.json

      - name: npm ci
        working-directory: ${{ steps.appdir.outputs.dir }}
        run: npm ci

      - name: Validar límites (Zod + fechas)
        working-directory: ${{ steps.appdir.outputs.dir }}
        run: npm run monitor:regulations

      - name: Cruce con IA (OpenAI y/o Claude, opcional)
        working-directory: ${{ steps.appdir.outputs.dir }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ -n "$OPENAI_API_KEY" ]; then ARGS="$ARGS --with-ai"; fi
          if [ -n "$ANTHROPIC_API_KEY" ]; then ARGS="$ARGS --with-claude"; fi
          if [ -z "$ARGS" ]; then
            echo "Sin OPENAI_API_KEY ni ANTHROPIC_API_KEY — solo validación Zod/fechas arriba."
            exit 0
          fi
          npm run monitor:regulations -- $ARGS
